<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apuestas entre amigos</title>

<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 800;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.card h3 {
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 18px;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 14px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 14px;
    font-size: 14px;
    color: #999;
    background: white;
    padding: 0 6px;
    transition: .2s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group select:focus + label,
.input-group select:not([value=""]) + label {
    top: -8px;
    font-size: 12px;
    color: #28a745;
}

button {
    width: 100%;
    padding: 14px;
    background: #28a745;
    border: none;
    color: white;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #218838;
}

table {
    width: 100%;
    border-collapse: collapse;
}

table thead {
    background: #28a745;
    color: white;
}

table th, table td {
    padding: 12px;
    text-align: center;
}

.resultado-box {
    margin-top: 25px;
    padding: 25px;
    border-radius: 18px;
    background: linear-gradient(135deg,#1d976c,#28a745);
    color: white;
    box-shadow: 0 15px 40px rgba(40,167,69,.4);
}
</style>
</head>

<body>

<h1>🎲 Apuestas entre Amigos</h1>

<div class="container">

<div class="card">
<h3>Agregar apuesta</h3>

<div class="input-group">
<select id="apostador">
<option value=""></option>
<option>Joshua</option>
<option>Roberto</option>
<option>Mario</option>
<option>Cesar</option>
<option>Alan</option>
<option>Victor</option>
</select>
<label>Quién apuesta</label>
</div>

<div class="input-group">
<input id="apostado" placeholder=" ">
<label>A qué resultado apuesta</label>
</div>

<div class="input-group">
<input type="number" id="monto" value="100" min="1" placeholder=" ">
<label>Monto</label>
</div>

<button onclick="agregarApuesta()">Agregar apuesta</button>
</div>

<div class="card">
<h3>Configuración</h3>

<div class="input-group">
<input type="number" id="porcentajeCasa" value="10" placeholder=" ">
<label>Porcentaje casa (%)</label>
</div>

<div class="input-group">
<select id="ganador"></select>
<label>Resultado ganador</label>
</div>

<button onclick="calcular()">Calcular</button>
<button onclick="borrarTodo()" style="margin-top:10px;background:#dc3545;">🧨 Cerrar apuesta</button>
</div>

<div class="card">
<h3>Apuestas registradas</h3>

<table>
<thead>
<tr><th>Apostador</th><th>Apostado</th><th>Monto</th></tr>
</thead>
<tbody id="tablaApuestas"></tbody>
</table>

<div id="resultados"></div>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhGrmeuejiZGJeDF_iE5Dgfdw7zF3AUPs",
  authDomain: "apuestas-amigos-37a8e.firebaseapp.com",
  projectId: "apuestas-amigos-37a8e",
  storageBucket: "apuestas-amigos-37a8e.appspot.com",
  messagingSenderId: "617056923351",
  appId: "1:617056923351:web:7340f79308752f43984a92"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = collection(db, "apuestas");

let apuestas = [];

onSnapshot(ref, snap => {
  apuestas = [];
  snap.forEach(d => apuestas.push({ id:d.id, ...d.data() }));
  renderizar();
});

window.agregarApuesta = async () => {
  const apostador = apostadorEl.value;
  const apostado = apostadoEl.value.trim();
  const monto = +montoEl.value;

  if(!apostador || !apostado || monto<=0) return alert("Datos inválidos");

  await addDoc(ref,{ apostador, apostado, monto, fecha:new Date() });

  apostadorEl.value="";
  apostadoEl.value="";
  montoEl.value=100;
};

window.borrarTodo = async () => {
  if(!confirm("¿Borrar TODAS las apuestas?")) return;
  const s = await getDocs(ref);
  s.forEach(d => deleteDoc(doc(db,"apuestas",d.id)));
};

const apostadorEl = document.getElementById("apostador");
const apostadoEl = document.getElementById("apostado");
const montoEl = document.getElementById("monto");

function renderizar(){
  tablaApuestas.innerHTML="";
  ganador.innerHTML="<option value=''></option>";

  apuestas.forEach(a=>{
    tablaApuestas.innerHTML+=`
      <tr><td>${a.apostador}</td><td>${a.apostado}</td><td>$${a.monto}</td></tr>`;
    if(![...ganador.options].some(o=>o.value===a.apostado)){
      ganador.add(new Option(a.apostado,a.apostado));
    }
  });
}

window.calcular = () => {
  const p = +porcentajeCasa.value;
  const g = ganador.value;
  const total = apuestas.reduce((s,a)=>s+a.monto,0);
  const casa = total*p/100;
  const bolsa = total-casa;
  const wins = apuestas.filter(a=>a.apostado===g);
  const sum = wins.reduce((s,a)=>s+a.monto,0);

  let html = `<div class="resultado-box"><h2>${g}</h2>`;
  wins.forEach(a=>{
    html+=`<p>${a.apostador}: $${((a.monto/sum)*bolsa).toFixed(2)}</p>`;
  });
  html+=`</div>`;
  resultados.innerHTML=html;
};
</script>

</body>
</html>
